<head>

  <title>ワイヤーロープ選定</title>
  <style>
    body { font-family: 'SansSerif', sans-serif; margin: 0; }
    .menubar { display: flex; background: #eee; padding: 8px; }

    .panel { margin: 30px auto; width: 260px; }
    .label { font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center;}

    .input-row input { width: 150px; font-size: 16px; }
    .btn { font-size: 18px; padding: 6px 24px; }
    .font { font-family: 'Times New Roman', serif; }
  </style>
</head>

      <button onclick="onFileOpen()">ファイル</button>

    </div>
  </nav>
    
<div class="panel">

    <button class="btn" onclick="onDecide()">ワイヤーロープ選択</button>
    <button class="btn" onclick="onDecide()">シンブルの呼び[mm]</button>
  </div>

      alert('ファイルメニューが押されました');
