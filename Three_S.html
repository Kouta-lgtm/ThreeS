<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>3S</title>
  <style>
    body { font-family: 'SansSerif', sans-serif; margin: 0; }
    .menubar { display: flex; background: #eee; padding: 8px; }
    .menu { margin-right: 20px; }
    .welcome-panel { display: flex; flex-direction: column; align-items: center; margin-top: 40px; }
    .welcome-label { font-size: 40px; font-weight: bold; }
    .input-label { font-size: 20px; margin-top: 20px; }
    .input-text { font-size: 18px; margin-top: 10px; text-align: center; }
    .spacer { height: 20px; }
    .start-btn { margin-top: 30px; font-size: 20px; padding: 8px 32px; }
  </style>
</head>
<body>
  <nav class="menubar">
    <div class="menu">
      <button onclick="onOpen()">開く</button>
    </div>
    <div class="menu">
      <button onclick="onSelect()">選択</button>
      <button onclick="onClose()">終了</button>
    </div>
  </nav>
  <div class="welcome-panel">
    <div class="welcome-label">ようこそ3Sへ!!</div>
    <div class="input-label">ファイル名を入力してください</div>
    <input id="filename" class="input-text" type="text" size="20" />
    <div class="spacer"></div>
    <button class="start-btn" onclick="onStart()">START</button>
  </div>
  <script>
    function onOpen() {
      alert('開くボタンが押されました');
    }
    function onSelect() {
      window.location.href = "Choice.html";
    }
    function onClose() {
      window.close();
    }
    function onStart() {
      const filename = document.getElementById('filename').value;
      if (!filename) {
        alert('ファイル名を入力してください');
        return;
      }
      alert('START: ' + filename);
    }
  </script>
</body>
</html>
