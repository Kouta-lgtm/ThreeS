<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ワイヤロープ選定</title>
  <style>
    body { font-family: 'SansSerif', sans-serif; margin: 0; }
 .panel { margin: 30px auto; width: 400px; }
    .label { font-size: 20px; font-weight: bold; margin-bottom: 20px; }
    .input-row { margin-bottom: 15px; display: flex; align-items: center; }
    .input-row label { width: 180px; }
    .input-row input { width: 150px; font-size: 16px; }
  .btn { font-size: 18px; padding: 4px 24px; white-space: nowrap; }
  
  </style>
</head>
<body>
  <div class="panel">
    <div class="label">設計した値を入れてください</div>
    <div class="input-row">
      <label for="rope">ワイヤロープ選択</label>
      <select id="rope" onchange="onRopeChange()">
        <option value="">--選択してください--</option>
        <option value="6x19">裸普通ZよりA種(6×19)</option>
        <option value="6x24">裸普通ZよりA種(6×24)</option>
        <option value="6x37">裸普通ZよりA種(6×37)</option>
      </select>
      <button type="button" class="btn" style="margin-left:8px;" onclick="showHint('rope')">ヒント</button>
    </div>
    
    <div class="btn-row">
      <button class="btn" onclick="onCalc()">保存</button>
      <button class="btn" onclick="onBack()">戻る</button>
    </div>
  </div>
  <script>
    function onRopeChange() {
      // 選択肢が変更されたときの処理
      // 必要に応じて実装
    }

    function showHint(type) {
      if (type === 'rope') {
        alert('教科書p.6を参考にしてください。一般に直径12mm以下は(6x19)、直径14mm以上は(6x24)または(6x37)が使用されます。');
      } else if (type === 'break') {
        const w = localStorage.getItem('kihon_w');
        alert('教科書P.3、式（２・１）を使用してください。巻き上げ荷重は ' + w + ' kN です。破断荷重の目安はこれに基づきます。');
      }
    }
    function onCalc() {
      const rope = document.getElementById('rope').value;
      if (!rope || rope.trim() === '') {
        alert('ワイヤロープを選択してください');
        return;
      }
      // 正しい場合、値をlocalStorageに保存
      localStorage.setItem('rope_design_rope', rope);

  alert('値が保存されました\n選択ロープ: ' + rope);
  window.location.href = 'rope_design2 - 選択式.html';
  // 必要に応じて計算処理を追加
    }

    function onBack() {
      window.location.href = 'choice.html';
    }
  </script>
</body>
</html>
